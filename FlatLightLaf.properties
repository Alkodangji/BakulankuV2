# To use this in your application, make sure that this properties file
# is included in your application JAR (e.g. in package `com.myapp.themes`)
# and invoke `FlatLaf.registerCustomDefaultsSource( "com.myapp.themes" );`
#
# GLOBAL
#
defaultFont = 13 "Poppins"
@primary=#0B5ED7
@success=#198754
@warning=#FFC107
@danger=#DC3545
@secondary=#6C757D

@background=#F8F9FA
@foreground=#212529

@briColor=#0957C3

Component.borderColor=@briColor
Component.focusedBorderColor=@briColor

ComboBox.buttonArrowColor=@briColor
#ComboBox.buttonBorderColor=@briColor
#ComboBox.buttonFocusedBorderColor=#000000

Component.arc=12
Button.arc=12
TextComponent.arc=12
ScrollBar.width=8

#
# BUTTON DEFAULT
#

Button.background=@primary
Button.foreground=#FFFFFF

#
# TABBEDPANE
#

TabbedPane.tabHeight=48
TabbedPane.showTabSeparators=false

TabbedPane.selectedBackground=@primary
TabbedPane.selectedForeground=#FFFFFF

#
# TABLE
#

Table.showHorizontalLines=false
Table.showVerticalLines=false

#
# SCROLLBAR
#

ScrollBar.thumbArc=999
ScrollBar.trackArc=999

#
# STYLE CLASSES
#
ComboBox.border = #000000
ComboBo

[style]primary
background=@primary
foreground=#FFFFFF

[style]success
background=@success
foreground=#FFFFFF

[style]warning
background=@warning
foreground=#000000

[style]danger
background=@danger
foreground=#FFFFFF

[style]secondary
background=@secondary
foreground=#FFFFFF

[style].briButton = 
arc:12;
borderWidth:2;
borderColor:#0957C3;
background:#0957C3;
foreground:#FFFFFF
# before setting the look and feel.
